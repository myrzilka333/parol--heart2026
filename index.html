<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FoxHeart :: КВЕСТ :: СИСТЕМНЫЙ ТЕРМИНАЛ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #000000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', 'Fira Code', monospace;
            font-size: 16px;
            line-height: 1.4;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
        html {
            scroll-behavior: smooth;
        }
        .terminal {
            width: 1000px;
            max-width: 100%;
            background: #000000;
            color: #ffffff;
            padding: 20px;
            position: relative;
            z-index: 2;
            height: 90vh;
            overflow-y: auto;
            scroll-behavior: smooth;
            border: none;
        }
        .terminal::-webkit-scrollbar {
            width: 8px;
            background: #111;
        }
        .terminal::-webkit-scrollbar-thumb {
            background: #00cc44;
        }
        .white { color: #ffffff; }
        .green { color: #00cc44; }
        .red   { color: #ff3333; }
        .eyes  { color: #ff3333; font-weight: bold; }
        .heart { color: #00ff66; font-weight: bold; }

        .line {
            white-space: pre-wrap;
            word-break: break-word;
            margin-bottom: 2px;
        }

        .input-line {
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            margin: 8px 0;
        }
        .prompt {
            color: #00cc44;
            margin-right: 12px;
            white-space: pre;
        }
        .input-field {
            background: #000000;
            border: none;
            color: #00cc44;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            outline: none;
            flex: 1;
            padding: 0;
            margin: 0;
            caret-color: #00cc44;
        }
        .input-field:focus { outline: none; }

        .alert-box {
            border: 3px solid #ff0000;
            background: #1a0000;
            padding: 20px;
            margin: 20px auto;
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            color: #ff0000;
            font-family: monospace;
            letter-spacing: 4px;
            animation: blinkRed 0.6s step-end infinite;
            box-shadow: 0 0 15px rgba(255,0,0,0.5);
        }
        @keyframes blinkRed {
            0%, 100% { opacity: 1; border-color: #ff0000; background: #2a0000; }
            50% { opacity: 0.6; border-color: #aa0000; background: #000000; }
        }

        .noise-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            background: repeating-radial-gradient(circle at 20% 30%, rgba(0,0,0,0), rgba(0,0,0,0.3) 1px, rgba(255,255,255,0.05) 1px, rgba(0,0,0,0) 2px);
            opacity: 0.7;
            animation: staticNoise 0.15s steps(2) infinite;
        }
        @keyframes staticNoise {
            0% { opacity: 0.5; background-position: 0 0; }
            100% { opacity: 0.9; background-position: 4px 6px; }
        }
        .crt-flicker {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9998;
            animation: flicker 0.08s infinite;
            box-shadow: inset 0 0 80px rgba(0,0,0,0.8);
        }
        @keyframes flicker {
            0% { opacity: 0.2; background: rgba(255,255,255,0.03); }
            20% { opacity: 0.5; background: rgba(0,0,0,0.15); }
            40% { opacity: 0.1; background: rgba(255,0,0,0.02); }
            60% { opacity: 0.3; background: rgba(0,0,0,0.2); }
            80% { opacity: 0.2; background: rgba(255,255,255,0.01); }
            100% { opacity: 0.2; background: rgba(0,0,0,0); }
        }
        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0) 0px, rgba(0,255,0,0.05) 1px, rgba(0,0,0,0) 3px);
            pointer-events: none;
            z-index: 9997;
            animation: scanMove 5s linear infinite;
        }
        @keyframes scanMove {
            0% { background-position: 0 0; }
            100% { background-position: 0 30px; }
        }
        .dust {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10000;
            background: radial-gradient(circle at 20% 40%, rgba(255,255,200,0.08) 1px, transparent 1px);
            background-size: 12px 12px;
            animation: dustMove 25s linear infinite;
        }
        @keyframes dustMove {
            0% { background-position: 0 0; }
            100% { background-position: 80px 80px; }
        }

        .glitch-logo {
            animation: logoGlitch 0.08s infinite, shakeLogo 0.1s infinite;
        }
        @keyframes logoGlitch {
            0% { filter: hue-rotate(0deg); opacity: 1; }
            25% { filter: hue-rotate(90deg); opacity: 0.8; transform: skewX(2deg); }
            75% { filter: hue-rotate(-90deg); opacity: 0.9; transform: skewX(-2deg); }
            100% { filter: hue-rotate(0deg); opacity: 1; transform: skewX(0deg); }
        }
        @keyframes shakeLogo {
            0% { transform: translate(0, 0); }
            25% { transform: translate(2px, -1px); }
            50% { transform: translate(-2px, 1px); }
            75% { transform: translate(1px, 2px); }
            100% { transform: translate(0, 0); }
        }

        .glitch-symbol {
            position: fixed;
            z-index: 10050;
            font-family: monospace;
            font-weight: bold;
            font-size: 26px;
            white-space: nowrap;
            pointer-events: none;
            animation: symbolGlitch 0.2s steps(2) 2, vanish 2s forwards;
            text-shadow: 2px 0 red, -2px 0 cyan;
        }
        @keyframes symbolGlitch {
            0% { transform: translate(0, 0); opacity: 1; }
            25% { transform: translate(3px, -2px); opacity: 0.8; }
            50% { transform: translate(-2px, 2px); opacity: 1; }
            75% { transform: translate(1px, -1px); opacity: 0.9; }
            100% { transform: translate(0, 0); opacity: 1; }
        }
        @keyframes vanish {
            0% { opacity: 1; }
            80% { opacity: 1; }
            100% { opacity: 0; }
        }

        .hidden { display: none; }
        
        /* Увеличенный логотип */
        .logo-image {
            display: block;
            margin: 25px auto;
            max-width: 400px;
            width: 100%;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
            transition: all 0.1s;
        }
        
        .shake-terminal {
            animation: terminalShake 0.08s infinite;
        }
        @keyframes terminalShake {
            0% { transform: translate(0, 0); }
            25% { transform: translate(1px, -1px); }
            50% { transform: translate(-1px, 1px); }
            75% { transform: translate(0px, 1px); }
            100% { transform: translate(0, 0); }
        }
        
        .qr-block {
            text-align: center;
            margin: 20px 0;
            padding: 20px;
            background: #0a1a0a;
            border: 2px solid #00cc44;
            border-radius: 4px;
        }
        .qr-block img {
            max-width: 350px;
            width: 100%;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
        }
        .address {
            color: #ffaa66;
            font-family: monospace;
            font-size: 18px;
            margin-top: 15px;
            font-weight: bold;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="terminal" id="terminal">
    <div class="white">FoxHeart Secure Terminal (c) 1985-2026</div>
    <div class="green">==============================================</div>
    <div id="authArea">
        <div class="line white">system ready. authentication required.</div>
        <div id="inputContainer"></div>
    </div>
    <div id="alertArea" class="hidden"></div>
    <div id="bootArea" class="hidden">
        <div id="bootOutput" class="output-area"></div>
        <div id="foxLogoContainer"></div>
    </div>
</div>

<div class="noise-overlay"></div>
<div class="crt-flicker"></div>
<div class="scanline"></div>
<div class="dust"></div>

<script>
    // ================= НАСТРОЙКИ =================
    const CORRECT_LOGIN = "foxhound";
    const CORRECT_PASSWORD = "heart2026";
    const MUSIC_FILE = "sound/obitel-starykh-tayn-12-83694e.mp3";  // изменён путь
    // ==============================================

    let state = "waiting_login";
    let loginBuffer = "";
    let passwordBuffer = "";
    let audioElement = null;
    let symbolInterval = null;
    let bootEyesInterval = null;
    let logoGlitchInterval = null;
    
    const terminalDiv = document.getElementById('terminal');
    const authArea = document.getElementById('authArea');
    const alertArea = document.getElementById('alertArea');
    const bootArea = document.getElementById('bootArea');
    const bootOutput = document.getElementById('bootOutput');
    const foxContainer = document.getElementById('foxLogoContainer');
    const inputContainer = document.getElementById('inputContainer');
    let currentInputElement = null;
    let currentRowDiv = null;
    let fullscreenEnabled = false;

    // --- ПРИНУДИТЕЛЬНЫЙ FULLSCREEN ПРИ ПЕРВОМ НАЖАТИИ КЛАВИШИ ---
    function requestFullscreenOnFirstInput() {
        if (!fullscreenEnabled && !document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(e => console.warn("fullscreen error", e));
            fullscreenEnabled = true;
        }
    }
    document.addEventListener('keydown', function firstKeyHandler() {
        requestFullscreenOnFirstInput();
        document.removeEventListener('keydown', firstKeyHandler);
    }, { once: true });

    function scrollToBottomSmooth() {
        terminalDiv.scrollTo({
            top: terminalDiv.scrollHeight,
            behavior: 'smooth'
        });
    }

    function addOutputLine(text, color = "white", target = bootOutput) {
        const div = document.createElement('div');
        div.className = `line ${color}`;
        div.innerText = text;
        target.appendChild(div);
        scrollToBottomSmooth();
        return div;
    }

    function spawnGlitchSymbol() {
        const symbols = [
            { char: "◉_◉", color: "#ff3333" }, { char: "⦿_⦿", color: "#ff3333" },
            { char: "(•_•)", color: "#ff3333" }, { char: "ಠ_ಠ", color: "#ff3333" },
            { char: "◉‿◉", color: "#ff3333" }, { char: "♥", color: "#00ff66" },
            { char: "(♥)", color: "#00ff66" }, { char: "♡", color: "#00ff66" },
            { char: "♥♥", color: "#00ff66" }, { char: "●_●", color: "#ff3333" }
        ];
        const item = symbols[Math.floor(Math.random() * symbols.length)];
        const div = document.createElement('div');
        div.className = 'glitch-symbol';
        div.style.color = item.color;
        div.innerText = item.char;
        const maxX = window.innerWidth - 80;
        const maxY = window.innerHeight - 80;
        const x = Math.random() * (maxX > 0 ? maxX : 200);
        const y = Math.random() * (maxY > 0 ? maxY : 200);
        div.style.left = x + "px";
        div.style.top = y + "px";
        document.body.appendChild(div);
        setTimeout(() => { if(div.parentNode) div.parentNode.removeChild(div); }, 2000);
    }

    function startSymbols() {
        if (symbolInterval) clearInterval(symbolInterval);
        symbolInterval = setInterval(() => {
            spawnGlitchSymbol();
            if (Math.random() < 0.4) setTimeout(spawnGlitchSymbol, 180);
        }, 3000 + Math.random() * 2500);
    }

    function startLogoGlitching() {
        if (logoGlitchInterval) clearInterval(logoGlitchInterval);
        logoGlitchInterval = setInterval(() => {
            const logoImg = document.querySelector('.logo-image');
            if (logoImg && (state === "booting" || state === "done")) {
                logoImg.classList.add('glitch-logo');
                setTimeout(() => {
                    if (logoImg) logoImg.classList.remove('glitch-logo');
                }, 300);
                if (Math.random() < 0.5) {
                    logoImg.style.transform = `translate(${Math.random() * 4 - 2}px, ${Math.random() * 4 - 2}px)`;
                    setTimeout(() => { if(logoImg) logoImg.style.transform = ''; }, 100);
                }
            }
        }, 1800);
    }

    function playBackgroundMusic() {
        if (audioElement) return;
        audioElement = new Audio(MUSIC_FILE);
        audioElement.loop = true;
        audioElement.volume = 0.2;
        audioElement.play().catch(e => console.warn("music blocked", e));
    }

    async function showAlertPhase() {
        state = "alert_phase";
        authArea.classList.add('hidden');
        alertArea.classList.remove('hidden');
        const messages = ["ДАННЫЕ ВВЕДЕНЫ", "НАЧИНАЮ ЗАГРУЗКУ ДАННЫХ", "ДОСТУП АКТИВЕН"];
        for (let msg of messages) {
            alertArea.innerHTML = `<div class="alert-box">${msg}</div>`;
            scrollToBottomSmooth();
            await sleep(6000);
        }
        alertArea.classList.add('hidden');
        await bootSystem();
    }

    function generateBootMessages() {
        const base = [
            "FoxHeart Kernel 4.19 (x86_64) #1 SMP PREEMPT",
            "Command line: BOOT_IMAGE=/vmlinuz-fox root=/dev/fox0 ro quiet splash",
            "Calibrating delay loop... 15872.55 BogoMIPS",
            "Mounting /proc, /sys, /dev... [ OK ]",
            "Starting systemd-foxd... [ OK ]",
            "Detected 1024 MB RAM, 64 MB reserved for FoxCore",
            "Loading crypto modules... serpent, twofish, foxcipher",
            "ACPI: Thermal zone [FOXZ] 38°C",
            "rand: crng initialized",
            "Проверка целостности /usr: [ OK ]",
            "Модуль framebuffer: vgafox (1024x768)",
            "[ STALKER ] Монолит ждёт своего героя...",
            "Загрузка драйвера сети: foxlink [ OK ]",
            "Демон heartd (PID 42) - лисье сердце бьётся в такт Зоне",
            "FoxWall активен, аномалии обходятся стороной",
            "SATA device: /dev/fox0 SSD, артефактов не обнаружено",
            "Mounting /home/fox... [ OK ]",
            "Память: 1022496K доступно, бандиты не пройдут",
            "[ ЗОНА ] Второй выброс через 72 часа",
            "BBS 'FoxNet' запущена на частоте сталкерской волны",
            "SoundBlaster 16 на IRQ 5, слышен вой псевдособаки",
            "MIDI синтезатор готов, фурри-мелодии активированы",
            "Терминал vt100, CP437, хвост поднят вверх",
            "/usr/bin/vi установлен, emacs нет, лапы не для кнопок",
            "[ Furries ] Пушистые ушки сканируют окружение",
            "Создание /var/log... завершено, хвосты залогированы",
            "cron запущен, фурри-вечеринка в 23:00",
            "NTP синхронизация с маяком 'Рыжий Лис'",
            "Установка $FOXPATH, мяу-хвост-рут",
            "Модуль foxsnd.ko загружен, мяуканье в системных вызовах",
            "Температура ядра 37.2°C, как у настоящего фурри в костюме",
            "SSH host key (RSA 4096), лапой по клавиатуре",
            "Машина готова, аномалия 'Желание' подавлена",
            "Загрузка окружения... сталкер, возьми свой PDA",
            "ALSA mixer загружен, гитара у костра",
            "Локаль ru_RU.CP437, говорят о Монолите",
            "ssh-агент запущен, прячь артефакты",
            "X11 не найден, работаем в консоли как бывалый сталкер",
            "Добро пожаловать в FoxHeart, фурри и сталкеры!",
            "Скрытые пасхалки: /dev/fox/null - аномалия 'Трамплин'",
            "Фурри-комьюнити приветствует тебя, хвост в трубу!",
            "man fox: 'Не ходи в Зону без детектора'",
            "Если вы это читаете, вы прошёл первый уровень"
        ];
        let full = [...base];
        for (let i=0; i<160; i++) {
            full.push(`Доп. шаг ${i+1} / 160 [ OK ] // Аномалия ${i+1} стабильна`);
        }
        full.push("Система полностью загружена. Добро пожаловать в FoxHeart OS.");
        full.push("Автоматический вход: fox (хвостатый администратор)");
        return full;
    }

    function showImageLogo() {
        const img = document.createElement('img');
        img.src = "img/logo.png";   // изменён путь
        img.alt = "FoxHeart Logo";
        img.className = "logo-image";
        foxContainer.appendChild(img);
        scrollToBottomSmooth();
    }

    function showFinalQR() {
        const qrDiv = document.createElement('div');
        qrDiv.className = 'qr-block';
        const qrImg = document.createElement('img');
        qrImg.src = "img/qr.png";   // изменён путь
        qrImg.alt = "QR-код";
        qrDiv.appendChild(qrImg);
        const addressP = document.createElement('div');
        addressP.className = 'address';
        addressP.innerText = "Россия, Краснодарский Край, Сочи, Партизанская улица, 62а";
        qrDiv.appendChild(addressP);
        foxContainer.appendChild(qrDiv);
        scrollToBottomSmooth();
    }

    async function bootSystem() {
        state = "booting";
        bootArea.classList.remove('hidden');
        bootOutput.innerHTML = "";
        foxContainer.innerHTML = "";
        
        const messages = generateBootMessages();
        bootEyesInterval = setInterval(() => {
            if (state === "booting") {
                const r = Math.random();
                if (r < 0.5) {
                    addOutputLine("◉_◉   ⦿_⦿   (•_•)   ◉‿◉  // сталкер, оглянись", "eyes", bootOutput);
                } else {
                    addOutputLine("♥   (♥)   ♡   ♥♥   // хвост пушистый, сердце горячее", "heart", bootOutput);
                }
            } else {
                clearInterval(bootEyesInterval);
            }
        }, 4000);
        
        for (let msg of messages) {
            addOutputLine(msg, "white", bootOutput);
            await sleep(18 + Math.random() * 12);
        }
        
        clearInterval(bootEyesInterval);
        showImageLogo();
        startLogoGlitching();
        await sleep(600);
        
        addOutputLine("", "white", bootOutput);
        addOutputLine("━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━", "green", bootOutput);
        addOutputLine("КВЕСТ ЗАВЕРШЁН. ФИНАЛЬНЫЕ КООРДИНАТЫ:", "white", bootOutput);
        showFinalQR();
        await sleep(500);
        addOutputLine("━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━", "green", bootOutput);
        addOutputLine("Найдите этот QR-код в реальности...", "green", bootOutput);
        
        state = "done";
    }

    function finishPasswordInput() {
        if (loginBuffer === CORRECT_LOGIN && passwordBuffer === CORRECT_PASSWORD) {
            addOutputLine("ДОСТУП РАЗРЕШЁН", "green", bootOutput);
            playBackgroundMusic();
            showAlertPhase().catch(console.error);
        } else {
            const errorDiv = document.createElement('div');
            errorDiv.className = 'line red';
            errorDiv.innerText = "ОШИБКА: неверный логин или пароль. Попробуйте снова.";
            authArea.appendChild(errorDiv);
            scrollToBottomSmooth();
            loginBuffer = "";
            passwordBuffer = "";
            if (currentInputElement) currentInputElement.value = "";
            if (currentRowDiv) currentRowDiv.remove();
            promptLogin();
        }
    }

    function onInputKeyDown(e, isPassword = false) {
        if (state !== "waiting_login" && state !== "waiting_password") {
            e.preventDefault();
            return;
        }
        if (e.key === 'Enter') {
            e.preventDefault();
            const val = currentInputElement.value;
            if (!isPassword) {
                loginBuffer = val;
                if (currentRowDiv) currentRowDiv.remove();
                addOutputLine(`login: ${loginBuffer}`, "white", bootOutput);
                promptPassword();
            } else {
                passwordBuffer = val;
                if (currentRowDiv) currentRowDiv.remove();
                addOutputLine(`password: ********`, "white", bootOutput);
                finishPasswordInput();
            }
        }
    }

    function promptLogin() {
        state = "waiting_login";
        const container = document.createElement('div');
        container.className = 'input-line';
        const promptSpan = document.createElement('span');
        promptSpan.className = 'prompt';
        promptSpan.innerText = 'login: ';
        const input = document.createElement('input');
        input.type = 'text';
        input.className = 'input-field';
        input.autocomplete = 'off';
        container.appendChild(promptSpan);
        container.appendChild(input);
        inputContainer.appendChild(container);
        
        currentRowDiv = container;
        currentInputElement = input;
        input.focus();
        input.addEventListener('keydown', (e) => onInputKeyDown(e, false));
        scrollToBottomSmooth();
    }

    function promptPassword() {
        state = "waiting_password";
        const container = document.createElement('div');
        container.className = 'input-line';
        const promptSpan = document.createElement('span');
        promptSpan.className = 'prompt';
        promptSpan.innerText = 'password: ';
        const input = document.createElement('input');
        input.type = 'password';
        input.className = 'input-field';
        container.appendChild(promptSpan);
        container.appendChild(input);
        inputContainer.appendChild(container);
        
        currentRowDiv = container;
        currentInputElement = input;
        input.focus();
        input.addEventListener('keydown', (e) => onInputKeyDown(e, true));
        scrollToBottomSmooth();
    }

    promptLogin();
    startSymbols();
    
    setInterval(() => {
        if (Math.random() < 0.3 && (state === "booting" || state === "alert_phase")) {
            terminalDiv.classList.add('shake-terminal');
            setTimeout(() => terminalDiv.classList.remove('shake-terminal'), 100);
        }
    }, 700);
    
    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
    
    document.body.addEventListener('click', () => {
        if (currentInputElement && (state === "waiting_login" || state === "waiting_password")) {
            currentInputElement.focus();
        }
    });
</script>
</body>
</html>
